---
- name: Rolling Patch Workflow
  hosts: "{{ patch_node }}"
  become: true
  gather_facts: true

  tasks:

    - name: Put node into standby
      command: pcs node standby {{ inventory_hostname }}

    - name: Wait for resource relocation
      pause:
        seconds: 30

    - name: Install updates
      dnf:
        name: "*"
        state: latest
      register: patch_result

    - name: Reboot if updates applied
      reboot:
        reboot_timeout: 900
      when: patch_result.changed

    - name: Wait for SSH
      wait_for_connection:
        timeout: 300

    - name: Return node to service
      command: pcs node unstandby {{ inventory_hostname }}

    - name: Verify cluster health
      command: pcs status
      register: cluster_status
      delegate_to: "{{ groups['pacemaker_nodes'][0] }}"
      run_once: true

    - name: Show cluster health
      debug:
        var: cluster_status.stdout_lines
