---
- name: Validate Pacemaker Cluster
  hosts: db-group
  become: true
  gather_facts: false

  tasks:

    - name: Check cluster status
      command: pcs status
      register: pcs_status
      changed_when: false

    - name: Display cluster status
      debug:
        var: pcs_status.stdout_lines

    - name: Check quorum status
      command: pcs quorum status
      register: quorum_status
      changed_when: false

    - name: Display quorum status
      debug:
        var: quorum_status.stdout_lines

    - name: Check fencing configuration
      command: pcs stonith show
      register: stonith_status
      changed_when: false
      failed_when: false

    - name: Display fencing configuration
      debug:
        var: stonith_status.stdout_lines

    - name: Verify quorum is active
      fail:
        msg: "Quorum is not active"
      when: "'Quorate: Yes' not in quorum_status.stdout"

    - name: Verify no failed resources
      fail:
        msg: "Cluster contains failed resources"
      when: "'Failed Resource Actions:' in pcs_status.stdout"

    - name: Verify cluster has quorum
      assert:
        that:
          - "'partition with quorum' in pcs_status.stdout"
        fail_msg: "Cluster quorum lost"
        success_msg: "Cluster quorum maintained"

    - name: Verify DB2 master exists
      assert:
        that:
          - "'Masters:' in pcs_status.stdout"
        fail_msg: "No DB2 master resource found"

    - name: Verify VIP resource exists
      assert:
        that:
          - "'DB2_IP' in pcs_status.stdout"
        fail_msg: "VIP resource not found"

    - name: Verify active DB2 VIP
      command: ip addr
      register: vip_status
      changed_when: false

    - name: Display VIP status
      debug:
        var: vip_status.stdout_lines

    - name: Validation successful
      debug:
        msg:
          - "Cluster healthy"
          - "Quorum maintained"
          - "STONITH configured"
          - "DB2 master active"
          - "VIP resource present"
          - "Validation PASSED"
