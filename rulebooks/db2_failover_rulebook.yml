---
- name: DB2 Failure Detection
  hosts: localhost
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Run validation when failure detected
      condition: event.status == "failed"
      action:
        run_job_template:
          name: cluster_validate
          organization: Default
