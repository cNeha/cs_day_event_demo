---
- name: DB2 Cluster Monitoring
  hosts: db1
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: High CPU Event
      condition:
        event.payload.pcp.pmie.rule == "High average processor utilization"
      action:
        run_job_template:
          name: cluster_validate
          organization: Default
